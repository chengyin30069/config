set -g allow-passthrough on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-kitty:Tc"
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set -g @catppuccin_flavour 'mocha' # or frappe, macchiato, mocha
bind C-space send-prefix
bind -n M-k previous-window
bind -n M-j next-window
bind -n M-n new-window
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
run '~/.tmux/plugins/tpm/tpm'

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=#0B0D15,fg=#A9D8D2"
set -g status-left-length 40
set -g status-right-length 100
set -g status-left "#[bg=#61E9FF,fg=#0B0D15,bold] #S #[bg=#222636,fg=#61E9FF] | "
set -g status-right "#[bg=#222636,fg=#A6F2C2] %Y-%m-%d #[bg=#FF6FAC,fg=#0B0D15,bold] %H:%M "
set -g window-status-format "#[bg=#222636,fg=#A9D8D2] #I:#W "
set -g window-status-current-format "#[bg=#FF6FAC,fg=#0B0D15,bold] #I:#W "
set -g pane-border-style "fg=#475B66"
set -g pane-active-border-style "fg=#61E9FF"
set -g message-style "bg=#222636,fg=#E9FBF8"
set -g mode-style "bg=#61E9FF,fg=#0B0D15"

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
